name: dr_swift_diagnostics
description: Dr Swift Diagnostics — customer mobile app for iOS and Android.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  cached_network_image: ^3.4.1
  connectivity_plus: ^6.1.4
  dio: ^5.8.0+1
  firebase_analytics: ^11.4.5
  firebase_auth: ^5.5.3
  firebase_core: ^3.13.0
  firebase_crashlytics: ^4.3.5
  firebase_messaging: ^15.2.5
  fl_chart: ^0.70.2
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.4
  flutter_svg: ^2.0.17
  freezed_annotation: ^2.4.4
  go_router: ^14.8.1
  google_sign_in: ^6.3.0
  intl: ^0.20.2
  json_annotation: ^4.9.0
  permission_handler: ^11.4.0
  share_plus: ^10.1.4
  sign_in_with_apple: ^6.1.4

dev_dependencies:
  build_runner: ^2.4.15
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/onboarding/
    - assets/icons/
    - assets/data/
